<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fang frugten 🧺</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: ui-rounded, "SF Pro Rounded", "Baloo 2", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #caf0f8, #90e0ef);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
    }
    .tilbage {
      font-size: 26px; text-decoration: none; background: #fff; border-radius: 50%;
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    .point { font-size: 30px; font-weight: bold; color: #03045e; }
    .liv { font-size: 26px; }

    #bane { position: fixed; inset: 0; overflow: hidden; }
    .frugt { position: absolute; font-size: 52px; will-change: transform; }
    #kurv { position: absolute; font-size: 72px; bottom: 20px; will-change: left; }

    #slut {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55); color: #fff; z-index: 20; text-align: center;
    }
    #slut h2 { font-size: 44px; margin: 0 0 10px; }
    #slut p { font-size: 26px; margin: 0 0 20px; }
    #slut button {
      font-size: 28px; padding: 16px 30px; border: none; border-radius: 20px;
      background: #ffd166; color: #03045e; box-shadow: 0 6px 0 rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="top">
    <a class="tilbage" href="../../">🏠</a>
    <div class="point">🍎 <span id="pointtal">0</span></div>
    <div class="liv" id="liv">❤️❤️❤️</div>
  </div>

  <div id="bane">
    <div id="kurv">🧺</div>
  </div>

  <div id="slut">
    <h2>Godt fanget! 🎉</h2>
    <p>Du fangede <span id="slutpoint">0</span> frugter</p>
    <button onclick="start()">Spil igen 🔄</button>
  </div>

  <script src="../../effekter.js"></script>
  <script>
    // ===== Fang frugten =====
    const frugtTyper = ["🍎","🍌","🍓","🍐","🍊","🍇","🍉","🍑","🥝","🍒"];
    const bane = document.getElementById("bane");
    const kurv = document.getElementById("kurv");
    const pointEl = document.getElementById("pointtal");
    const livEl = document.getElementById("liv");
    const slutEl = document.getElementById("slut");

    let point, liv, frugter, spawnTimer, spawnInterval, fald, kurvX, sidste, kører;

    let lyd;
    function tone(frekvens, type, længde) {
      if (!lyd) lyd = new (window.AudioContext || window.webkitAudioContext)();
      const o = lyd.createOscillator(), g = lyd.createGain();
      o.connect(g); g.connect(lyd.destination);
      o.type = type; o.frequency.value = frekvens;
      g.gain.setValueAtTime(0.25, lyd.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, lyd.currentTime + længde);
      o.start(); o.stop(lyd.currentTime + længde);
    }
    const fangLyd = () => tone(700 + Math.random()*300, "square", 0.12);
    const missLyd = () => tone(160, "sawtooth", 0.3);

    function start() {
      // ryd gamle frugter
      document.querySelectorAll(".frugt").forEach(f => f.remove());
      point = 0; liv = 3; frugter = [];
      spawnTimer = 0; spawnInterval = 1.1; fald = 160;
      pointEl.textContent = 0; livEl.textContent = "❤️❤️❤️";
      kurvX = window.innerWidth / 2;
      slutEl.style.display = "none";
      kører = true;
      sidste = performance.now();
      requestAnimationFrame(loop);
    }

    function flytKurv(klientX) {
      const halv = kurv.offsetWidth / 2;
      kurvX = Math.max(halv, Math.min(window.innerWidth - halv, klientX));
      kurv.style.left = (kurvX - halv) + "px";
    }
    // Kurven følger fingeren
    bane.addEventListener("pointerdown", e => flytKurv(e.clientX));
    bane.addEventListener("pointermove", e => flytKurv(e.clientX));

    function spawnFrugt() {
      const el = document.createElement("div");
      el.className = "frugt";
      el.textContent = frugtTyper[Math.floor(Math.random() * frugtTyper.length)];
      const x = 20 + Math.random() * (window.innerWidth - 80);
      const f = { el, x, y: -60 };
      el.style.left = x + "px";
      el.style.top = "-60px";
      bane.appendChild(el);
      frugter.push(f);
    }

    function tabLiv() {
      liv--;
      livEl.textContent = "❤️".repeat(liv) + "🖤".repeat(3 - liv);
      missLyd();
      if (liv <= 0) slutSpil();
    }

    function slutSpil() {
      kører = false;
      document.getElementById("slutpoint").textContent = point;
      slutEl.style.display = "flex";
    }

    function loop(nu) {
      if (!kører) return;
      const dt = Math.min((nu - sidste) / 1000, 0.05);
      sidste = nu;

      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnFrugt();
        spawnInterval = Math.max(0.55, spawnInterval * 0.98);
        fald = Math.min(420, fald + 4);          // falder hurtigere over tid
      }

      const kurvTop = window.innerHeight - kurv.offsetHeight - 20;
      const halv = kurv.offsetWidth / 2;

      for (const f of frugter) {
        if (f.fanget) continue;
        f.y += fald * dt;
        f.el.style.top = f.y + "px";

        // Fanget? (frugten er nede ved kurven og inden for dens bredde)
        if (f.y + 40 >= kurvTop && f.y < kurvTop + 60) {
          if (Math.abs((f.x + 26) - kurvX) < halv + 10) {
            f.fanget = true; f.el.remove();
            point++; pointEl.textContent = point; fangLyd();
            Effekter.konfetti(f.x + 26, kurvTop, { antal: 18 });
            if (point % 10 === 0) {                 // stor fest hvert 10. frugt
              Effekter.fanfare();
              Effekter.stjerner(window.innerWidth / 2, window.innerHeight / 2, { antal: 18 });
              Effekter.flash("#ffffff");
            }
            continue;
          }
        }
        // Røg forbi bunden = tabt liv
        if (f.y > window.innerHeight + 20) {
          f.fanget = true; f.el.remove();
          tabLiv();
        }
      }
      frugter = frugter.filter(f => !f.fanget);

      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", () => flytKurv(kurvX));
    start();
  </script>
</body>
</html>
