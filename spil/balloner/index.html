<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pop ballonerne 🎈</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: ui-rounded, "SF Pro Rounded", "Baloo 2", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #bde0fe, #a2d2ff);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .top {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
    }
    .tilbage {
      font-size: 26px; text-decoration: none; background: #fff; border-radius: 50%;
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    .point { font-size: 32px; font-weight: bold; color: #03045e; }

    #himmel { position: fixed; inset: 0; overflow: hidden; }

    .ballon {
      position: absolute;
      width: 76px; height: 92px;
      border-radius: 50% 50% 48% 48% / 55% 55% 45% 45%;
      background: radial-gradient(circle at 32% 26%,
                  hsl(var(--h),95%,82%), hsl(var(--h),85%,55%));
      box-shadow: inset -8px -10px 0 rgba(0,0,0,0.10);
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    /* Lille knude under ballonen */
    .ballon::after {
      content: ""; position: absolute; bottom: -6px; left: 50%;
      width: 10px; height: 10px; transform: translateX(-50%) rotate(45deg);
      background: hsl(var(--h),85%,55%);
    }
    .ballon.pop { transform: scale(1.6); opacity: 0; }
  </style>
</head>
<body>
  <div class="top">
    <a class="tilbage" href="../../">🏠</a>
    <div class="point">🎈 <span id="pointtal">0</span></div>
    <div style="width:50px"></div>
  </div>

  <div id="himmel"></div>

  <script src="../../effekter.js"></script>
  <script>
    // ===== Pop ballonerne =====
    const himmel = document.getElementById("himmel");
    const pointEl = document.getElementById("pointtal");
    let point = 0;
    let balloner = [];
    let spawnTimer = 0, spawnInterval = 0.9;  // sekunder mellem balloner
    let sidste = performance.now();

    // Pop-lyd uden lydfiler
    let lyd;
    function popLyd() {
      if (!lyd) lyd = new (window.AudioContext || window.webkitAudioContext)();
      const o = lyd.createOscillator(), g = lyd.createGain();
      o.connect(g); g.connect(lyd.destination);
      o.type = "triangle";
      o.frequency.setValueAtTime(900 + Math.random()*300, lyd.currentTime);
      o.frequency.exponentialRampToValueAtTime(200, lyd.currentTime + 0.15);
      g.gain.setValueAtTime(0.3, lyd.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, lyd.currentTime + 0.18);
      o.start(); o.stop(lyd.currentTime + 0.18);
    }

    function spawn() {
      const el = document.createElement("div");
      el.className = "ballon";
      const hue = Math.floor(Math.random() * 360);
      el.style.setProperty("--h", hue);
      const b = {
        el, hue,
        x: 20 + Math.random() * (window.innerWidth - 120),
        y: window.innerHeight + 40,
        fart: 90 + Math.random() * 120,          // px pr. sekund opad
        drift: (Math.random() - 0.5) * 40,       // lidt sidelæns
        død: false
      };
      el.style.left = b.x + "px";
      el.style.top = b.y + "px";
      el.addEventListener("pointerdown", e => { e.preventDefault(); pop(b); });
      himmel.appendChild(el);
      balloner.push(b);
    }

    function pop(b) {
      if (b.død) return;
      b.død = true;
      point++; pointEl.textContent = point;
      popLyd();
      // Konfetti-eksplosion i ballonens farve
      Effekter.konfetti(b.x + 38, b.y + 46, {
        antal: 24,
        farver: [`hsl(${b.hue},85%,60%)`, `hsl(${b.hue},90%,75%)`, "#ffffff"]
      });
      if (point % 10 === 0) {                   // stor fest hvert 10. pop
        Effekter.fanfare();
        Effekter.stjerner(window.innerWidth / 2, window.innerHeight / 2, { antal: 18 });
        Effekter.flash("#ffffff");
      }
      b.el.classList.add("pop");
      setTimeout(() => b.el.remove(), 150);
    }

    function loop(nu) {
      const dt = Math.min((nu - sidste) / 1000, 0.05);
      sidste = nu;

      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawn();
        spawnInterval = Math.max(0.45, spawnInterval * 0.985); // bliver lidt sværere
      }

      for (const b of balloner) {
        if (b.død) continue;
        b.y -= b.fart * dt;
        b.x += b.drift * dt;
        b.el.style.top = b.y + "px";
        b.el.style.left = b.x + "px";
        if (b.y < -120) { b.død = true; b.el.remove(); }   // fløj væk
      }
      balloner = balloner.filter(b => !b.død);

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
