<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dyre-piano 🎹</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "Comic Sans MS", "Chalkboard", system-ui, sans-serif;
      background: linear-gradient(160deg, #ffafcc, #ffc8dd);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent; touch-action: none;
      display: flex; flex-direction: column; height: 100vh;
    }
    .top { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
    .tilbage {
      font-size: 26px; text-decoration: none; background: #fff; border-radius: 50%;
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    h2 { text-align: center; color: #a4133c; margin: 4px; font-size: clamp(18px,4vw,26px); }

    .tangenter { flex: 1; display: flex; gap: 8px; padding: 14px; }
    .tangent {
      flex: 1; border-radius: 18px; display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 24px; font-size: clamp(36px, 9vw, 70px);
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.12); transition: transform 0.05s, filter 0.05s;
    }
    .tangent.tryk { transform: scale(0.95); filter: brightness(1.2); }
  </style>
</head>
<body>
  <div class="top">
    <a class="tilbage" href="../../">🏠</a>
    <div style="font-size:30px">🎹</div>
    <div style="width:50px"></div>
  </div>
  <h2>Tryk på dyrene og lav musik! 🎶</h2>
  <div class="tangenter" id="tangenter"></div>

  <script src="../../effekter.js"></script>
  <script>
    // ===== Dyre-piano =====
    const noter = [
      { dyr: "🐸", farve: "#06d6a0", hz: 262 },
      { dyr: "🐱", farve: "#ffd166", hz: 294 },
      { dyr: "🐶", farve: "#ff9e6d", hz: 330 },
      { dyr: "🐮", farve: "#ef476f", hz: 349 },
      { dyr: "🐷", farve: "#ffafcc", hz: 392 },
      { dyr: "🦆", farve: "#118ab2", hz: 440 },
      { dyr: "🐵", farve: "#8338ec", hz: 494 },
      { dyr: "🦁", farve: "#fb8500", hz: 523 },
    ];
    const container = document.getElementById("tangenter");

    function spil(hz) {
      const a = Effekter.audio(), o = a.createOscillator(), g = a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type = "triangle"; o.frequency.value = hz;
      g.gain.setValueAtTime(0.3, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.6);
      o.start(); o.stop(a.currentTime + 0.6);
    }

    noter.forEach(n => {
      const t = document.createElement("div");
      t.className = "tangent";
      t.style.background = n.farve;
      t.textContent = n.dyr;
      const ned = e => {
        e.preventDefault();
        spil(n.hz);
        t.classList.add("tryk");
        const r = t.getBoundingClientRect();
        Effekter.stjerner(r.left + r.width/2, r.top + 40, { antal: 5, emojis: ["✨","🎵","⭐","💫"] });
      };
      const op = () => t.classList.remove("tryk");
      t.addEventListener("pointerdown", ned);
      t.addEventListener("pointerup", op);
      t.addEventListener("pointerleave", op);
      container.appendChild(t);
    });
  </script>
</body>
</html>
