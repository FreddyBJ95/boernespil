<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tryk på dyret 🐮</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "Comic Sans MS", "Chalkboard", system-ui, sans-serif;
      background: linear-gradient(160deg, #bde0fe, #a2d2ff);
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Tilbage-knap til forsiden */
    .tilbage {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      font-size: 28px; text-decoration: none;
      background: #fff; border-radius: 50%;
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }

    /* Pointtæller */
    .point {
      position: fixed; top: 16px; right: 20px; z-index: 10;
      font-size: 40px; font-weight: bold; color: #03045e;
    }

    /* Spillepladen, hvor dyret dukker op */
    #plade { position: fixed; inset: 0; }

    /* Selve dyret man trykker på */
    #dyr {
      position: absolute;
      font-size: 110px;
      cursor: pointer;
      transition: transform 0.08s ease;
      line-height: 1;
    }
    #dyr.tryk { transform: scale(1.4); }
  </style>
</head>
<body>
  <a class="tilbage" href="../../">🏠</a>
  <div class="point">⭐ <span id="pointtal">0</span></div>
  <div id="plade">
    <div id="dyr">🐮</div>
  </div>

  <script>
    // ===== Tryk på dyret — simpelt spil til 3-6 år =====

    const dyrListe = ["🐮","🐷","🐔","🐶","🐱","🐸","🐵","🐰","🦊","🐼","🐯","🦁"];
    const dyrEl   = document.getElementById("dyr");
    const pointEl = document.getElementById("pointtal");
    let point = 0;

    // Laver en glad "pling"-lyd uden lydfiler (Web Audio).
    let lyd;
    function pling() {
      if (!lyd) lyd = new (window.AudioContext || window.webkitAudioContext)();
      const o = lyd.createOscillator();
      const g = lyd.createGain();
      o.connect(g); g.connect(lyd.destination);
      o.type = "sine";
      // To toner der hopper op = glad lyd
      o.frequency.setValueAtTime(523, lyd.currentTime);      // C
      o.frequency.setValueAtTime(784, lyd.currentTime + 0.1); // G
      g.gain.setValueAtTime(0.3, lyd.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, lyd.currentTime + 0.3);
      o.start();
      o.stop(lyd.currentTime + 0.3);
    }

    // Flytter dyret til et nyt tilfældigt sted og skifter til et nyt dyr.
    function nytDyr() {
      const margin = 80;
      const x = margin + Math.random() * (window.innerWidth  - margin * 2 - 110);
      const y = margin + Math.random() * (window.innerHeight - margin * 2 - 110);
      dyrEl.style.left = x + "px";
      dyrEl.style.top  = y + "px";
      dyrEl.textContent = dyrListe[Math.floor(Math.random() * dyrListe.length)];
    }

    // Når barnet rører dyret: lyd, point, og dyret flytter sig.
    function ramt(e) {
      e.preventDefault();
      point++;
      pointEl.textContent = point;
      pling();
      dyrEl.classList.add("tryk");
      setTimeout(() => dyrEl.classList.remove("tryk"), 120);
      nytDyr();
    }

    // "pointerdown" virker for både finger (tablet) og mus (computer).
    dyrEl.addEventListener("pointerdown", ramt);

    // Placer det første dyr, og igen hvis skærmen vendes/ændrer størrelse.
    nytDyr();
    window.addEventListener("resize", nytDyr);
  </script>
</body>
</html>
