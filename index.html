<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spil for ungerne 🎈</title>
  <link rel="stylesheet" href="style.css">

  <!-- PWA: gør siden installerbar som app -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2a1a5e">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Børnespil">
</head>
<body>
  <!-- Aurora-baggrund + svævende lys-kugler -->
  <div class="pynt"></div>
  <div class="orb" style="width:200px;height:200px;background:#ff6ec7;left:8%;top:30%;animation-duration:13s"></div>
  <div class="orb" style="width:160px;height:160px;background:#4cc9f0;right:10%;top:18%;animation-duration:17s"></div>
  <div class="orb" style="width:220px;height:220px;background:#b15bff;left:55%;top:70%;animation-duration:15s"></div>

  <header>
    <h1>Spil for ungerne</h1>
    <p class="undertekst">✨ Tryk på et kort og leg ✨</p>
  </header>

  <!-- Hvert <a> er en knap til et spil. Tilføj et nyt spil ved at kopiere én blok. -->
  <main class="spil-gitter">

    <a class="spil-kort" href="spil/tryk-paa-dyret/" style="--farve:#ffd166">
      <span class="ikon">🐮</span><span class="navn">Tryk på dyret</span>
    </a>
    <a class="spil-kort" href="spil/slange/" style="--farve:#80ed99">
      <span class="ikon">🐍</span><span class="navn">Fjollet Slange</span>
    </a>
    <a class="spil-kort" href="spil/tegne/" style="--farve:#ff8fab">
      <span class="ikon">🎨</span><span class="navn">Tegn!</span>
    </a>
    <a class="spil-kort" href="spil/balloner/" style="--farve:#4cc9f0">
      <span class="ikon">🎈</span><span class="navn">Pop ballonerne</span>
    </a>
    <a class="spil-kort" href="spil/find-par/" style="--farve:#ffb703">
      <span class="ikon">🧠</span><span class="navn">Find par</span>
    </a>
    <a class="spil-kort" href="spil/fang/" style="--farve:#b15bff">
      <span class="ikon">🧺</span><span class="navn">Fang frugten</span>
    </a>
    <a class="spil-kort" href="spil/muldvarp/" style="--farve:#52b788">
      <span class="ikon">🔨</span><span class="navn">Slå muldvarpen</span>
    </a>
    <a class="spil-kort" href="spil/tael/" style="--farve:#ff9e6d">
      <span class="ikon">🔢</span><span class="navn">Tæl dyrene</span>
    </a>
    <a class="spil-kort" href="spil/simon/" style="--farve:#c77dff">
      <span class="ikon">🎵</span><span class="navn">Husk farverne</span>
    </a>
    <a class="spil-kort" href="spil/piano/" style="--farve:#ff70a6">
      <span class="ikon">🎹</span><span class="navn">Dyre-piano</span>
    </a>
    <a class="spil-kort" href="spil/undvig/" style="--farve:#48cae4">
      <span class="ikon">🚀</span><span class="navn">Undvig stenene</span>
    </a>
    <a class="spil-kort" href="spil/puslespil/" style="--farve:#90e0a0">
      <span class="ikon">🧩</span><span class="navn">Skydepuslespil</span>
    </a>
    <a class="spil-kort" href="spil/skibidi/" style="--farve:#ff477e">
      <span class="ikon">🚽</span><span class="navn">Skibidi Toilet</span>
    </a>

  </main>

  <!-- Registrér service worker (offline + installerbar) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
