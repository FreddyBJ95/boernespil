<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <!-- Vigtigt for tablets: gør siden touch-venlig og forhindrer zoom ved dobbelt-tap -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spil for ungerne 🎈</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🎈 Vælg et spil 🎈</h1>
  </header>

  <!-- Hvert <a> her er en knap til et spil. For at tilføje et nyt spil:
       kopier én "spil-kort"-blok og ret link, emoji og navn. -->
  <main class="spil-gitter">

    <a class="spil-kort" href="spil/tryk-paa-dyret/" style="--farve:#ffd166">
      <span class="ikon">🐮</span>
      <span class="navn">Tryk på dyret</span>
    </a>

    <a class="spil-kort" href="spil/slange/" style="--farve:#caffbf">
      <span class="ikon">🐍</span>
      <span class="navn">Fjollet Slange</span>
    </a>

    <a class="spil-kort" href="spil/tegne/" style="--farve:#ffadad">
      <span class="ikon">🎨</span>
      <span class="navn">Tegn!</span>
    </a>

  </main>
</body>
</html>
